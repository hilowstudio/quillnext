name: CI

on:
  push:
    branches: [main]
  pull_request:

# Catches the class of breakage that slipped to Vercel (prisma config / generate
# failures and type errors) BEFORE merge. No DB or secrets required: prisma.config
# falls back to an undefined datasource URL when env is unset, and `prisma generate`
# does not connect.
jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm run postgenerate
      - run: npx tsc --noEmit
